<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How to Train Your LLM</title>
  <meta name="description" content="An interactive guide to building a language model from scratch">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/main.css">
  <link rel="stylesheet" href="/src/styles/narrator.css">
</head>
<body data-act="1">
  <div id="app">
    <div id="stage"></div>
    <div id="narrator-container"></div>
    <div id="landing-container"></div>
    <div id="lang-toggle">
      <span id="lang-en" class="lang-opt active">EN</span>
      <span class="lang-sep">/</span>
      <span id="lang-zh" class="lang-opt">中文</span>
    </div>
    <div id="footer">
      <div id="sound-toggle">
        <span id="sound-label">ON</span>
      </div>
      <div id="progress-dots"></div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
