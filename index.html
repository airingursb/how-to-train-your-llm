<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How to Train Your LLM</title>
  <meta name="description" content="An interactive guide to building a language model from scratch">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/main.css">
  <link rel="stylesheet" href="/src/styles/narrator.css">
</head>
<body data-act="1">
  <div id="app">
    <div id="stage"></div>
    <div id="narrator-container"></div>
    <div id="landing-container"></div>
    <div id="sound-toggle">
      <svg id="sound-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
      <svg id="sound-mute-line" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="position:absolute;top:0;left:0;display:none;">
        <line x1="2" y1="2" x2="22" y2="22"/>
      </svg>
    </div>
    <div id="lang-toggle">
      <span id="lang-en" class="lang-opt active">EN</span>
      <span class="lang-sep">/</span>
      <span id="lang-zh" class="lang-opt">中文</span>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
